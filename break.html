<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Game Facts</title>
</head>

<body class="Greee">
    <iframe class="responsive-iframe" src="https://www.youtube.com/embed/BHACKCNDMW8?si=pp8E4gwk0ds1TO52"
        title="YouTube video player" frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <br>
    </br>
    <div id="game">
        <div>
            <p><a id="counter">0</a></p>
            <button id="button" type="button"><img draggable="false" width="200"
                    src="https://www.kindpng.com/picc/m/749-7496261_tree-emoji-png-download-nature-emoji-tree-transparent.png" /></button>
        </div>
        <div>
            <h3 style="margin:0.5em">Upgrade Shop</h3>
            <div id="upgrades">
                <ul>
                    <li><button id="axe">Axe| +1 wood per click| <span id="axe_cost"></span></button></li>
                    <li><button id="lumberjack">Lumberjack| +1 wood per second| <span id="lumberjack_cost"></span>
                        </button>
                    </li>
                    <li><button id="chainsaw">Chainsaw| +10 wood per click| <span id="chainsaw_cost"></span></button>
                    </li>
                    <li><button id="woodchuck">Woodchuck| +25 wood per second| <span
                                id="woodchuck_cost"></span></button></li>
                    <li><button id="timber_harvester">Timber Harvester| +100 wood per click| <span
                                id="timber_harvester_cost"></span></button></li>

                </ul>
            </div>
            <button id="Reset">Reset Data</button>
        </div>
    </div>


    <br></br>
    <div>
        <a class="Home" href="index.html">Home</a>
        <script src="./script.js"></script>
    </div>
</body>
